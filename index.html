<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071629" />
  <title>MansHockey Pro</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">MH</div>
        <div><strong>MansHockey</strong><span>Family Pro v5</span></div>
      </div>
      <nav>
        <button class="nav active" data-view="dashboard">Hem</button>
        <button class="nav" data-view="matches">Matcher</button>
        <button class="nav" data-view="reports">Matchrapporter</button>
        <button class="nav" data-view="stats">Måns statistik</button>
        <button class="nav" data-view="flights">Flygresor</button>
        <button class="nav" data-view="media">Media</button>
        <button class="nav" data-view="family">Familj</button>
      </nav>
      <div class="side-card">
        <span class="eyebrow">Snabblänk</span>
        <a href="https://www.brooksbandits.net" target="_blank" rel="noreferrer">Brooks Bandits</a>
        <a href="https://bchl.ca" target="_blank" rel="noreferrer">BCHL</a>
        <a href="https://www.eliteprospects.com/player/801209/mans-agren" target="_blank" rel="noreferrer">EliteProspects</a>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Brooks Bandits · BCHL 2026/27</p>
          <h1 id="pageTitle">Måns Ågren</h1>
        </div>
        <div class="clock-card">
          <span>Sverige</span><strong id="seClock">--:--</strong>
          <span>Brooks</span><strong id="brooksClock">--:--</strong>
        </div>
      </header>

      <section id="dashboard" class="view active"></section>
      <section id="matches" class="view"></section>
      <section id="reports" class="view"></section>
      <section id="stats" class="view"></section>
      <section id="flights" class="view"></section>
      <section id="media" class="view"></section>
      <section id="family" class="view"></section>
    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js');
  </script>
</body>
</html>
